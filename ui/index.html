<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>Atlas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    #map { width: 100vw; height: 100vh; }
    .maplibregl-canvas { cursor: crosshair !important; }

    /* ── Geocoder selector ────────────────────────────────────────────── */
    #selector {
      position: fixed; inset: 0;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2.5rem;
      z-index: 1000;
      transition: opacity 0.3s linear;
    }
    #selector.done { opacity: 0; pointer-events: none; }

    #selector h1 {
      font-size: 11px; font-weight: 400;
      letter-spacing: .22em; color: #444;
      text-transform: uppercase;
    }
    .s-cards {
      display: flex; gap: 1.2rem; flex-wrap: wrap; justify-content: center;
    }
    #selector button {
      display: flex; flex-direction: column;
      align-items: flex-start;
      padding: 1.4rem 2rem;
      background: none;
      border: 1px solid #1a1a1a;
      color: #888;
      cursor: pointer;
      transition: border-color .15s, color .15s;
      text-align: left;
      min-width: 130px;
    }
    #selector button:hover { border-color: #444; color: #fff; }
    #selector button .s-name { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 0.35rem; }
    #selector button .s-desc { font-size: 0.7rem; color: #333; font-family: 'SF Mono', 'Menlo', monospace; }
    #selector button:hover .s-desc { color: #555; }

    /* ── Loading screen ───────────────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px;
      z-index: 999;
      transition: opacity 0.3s linear;
    }
    #loading.done { opacity: 0; pointer-events: none; }

    #loading-name {
      font-size: 22px; font-weight: 600;
      letter-spacing: -0.5px; color: #fff;
    }
    #loading-sub { font-size: 12px; font-weight: 400; color: #444; }

    #progress-track {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px; background: #0d0d0d;
    }
    #progress-fill {
      height: 100%; width: 0%;
      background: #fff;
      transition: width 0.15s ease-out;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="selector">
    <h1>Atlas</h1>
    <div class="s-cards">
      <button data-geo="z0">
        <span class="s-name">Z0</span>
        <span class="s-desc">Morton · RGEO0002</span>
      </button>
      <button data-geo="s2">
        <span class="s-name">S2</span>
        <span class="s-desc">H3 cells · RGEO0001</span>
      </button>
      <button data-geo="h3">
        <span class="s-name">H3</span>
        <span class="s-desc">H3 cells · LKHA0001</span>
      </button>
    </div>
  </div>

  <div id="loading" style="display:none">
    <span id="loading-name">World Map</span>
    <span id="loading-sub">Loading offline data…</span>
    <div id="progress-track"><div id="progress-fill"></div></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
